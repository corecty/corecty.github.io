<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>カケミル ログイン</title>
    <meta
      name="description"
      content="カケミルのメールログインリンクを開くための案内ページです。"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f2;
        --surface: #ffffff;
        --text: #222222;
        --muted: #666666;
        --border: #deded6;
        --accent: #1f8a5b;
        --accent-dark: #166a45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          "Hiragino Sans",
          "Yu Gothic",
          "YuGothic",
          "Noto Sans JP",
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 45px rgba(30, 40, 35, 0.08);
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #e8f4ed;
        color: var(--accent-dark);
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 18px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.35;
        margin: 0 0 12px;
        letter-spacing: 0;
      }

      p {
        font-size: 15px;
        line-height: 1.8;
        margin: 0 0 16px;
        color: var(--muted);
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 22px;
      }

      a {
        color: inherit;
      }

      .button {
        display: block;
        width: 100%;
        text-align: center;
        text-decoration: none;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 700;
      }

      .primary {
        background: var(--accent);
        color: #ffffff;
      }

      .secondary {
        background: #f2f2ec;
        color: var(--text);
      }

      .note {
        font-size: 13px;
        line-height: 1.7;
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-hidden="true">カ</div>
      <h1>カケミルのログインリンクです</h1>
      <p>
        iPhoneでこのページを開いている場合は、下のボタンからカケミルアプリに戻ってログインを完了してください。
      </p>
      <p>
        PCで開いている場合はログインを完了できません。メールをiPhoneで開き直してください。
      </p>

      <div class="actions">
        <a id="open-app" class="button primary" href="kakemiru://auth/callback">
          カケミルアプリを開く
        </a>
        <a class="button secondary" href="https://apps.apple.com/jp/app/id6768295691">
          App Storeでカケミルを開く
        </a>
      </div>

      <p class="note">
        ログインリンクには有効期限があります。期限切れの場合は、アプリのログイン画面からもう一度メールを送信してください。
      </p>
    </main>

    <script>
      const callbackPath = window.location.search + window.location.hash;
      const appUrl = "kakemiru://auth/callback" + callbackPath;
      const openApp = document.getElementById("open-app");
      openApp.setAttribute("href", appUrl);

      const isLikelyMobile =
        /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isLikelyMobile && callbackPath) {
        window.setTimeout(() => {
          window.location.href = appUrl;
        }, 400);
      }
    </script>
  </body>
</html>
